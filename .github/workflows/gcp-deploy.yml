name: GCP Deployment (Remote Build)
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          # Using the WIF Service Account from the 'xinference' project
          workload_identity_provider: 'projects/346794112698/locations/global/workloadIdentityPools/openhub-github-pool/providers/openhub-github-provider'
          service_account: 'openhub-github-sa@xinference.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          project_id: 'gen-lang-client-0208597279'

      - name: Sync Source and Build Remotely
        shell: bash
        run: |
          INSTANCE_NAME="instance-pararouter"
          ZONE="us-central1-f"
          PROJECT="gen-lang-client-0208597279"
          DEST_DIR="/home/mac-m4/openhub"

          # 1. Prepare target directory and ensure correct ownership
          gcloud compute ssh $INSTANCE_NAME --zone=$ZONE --project=$PROJECT --quiet --command="
            sudo mkdir -p $DEST_DIR
            sudo chown -R \$(whoami):\$(whoami) $DEST_DIR
            rm -rf $DEST_DIR/web $DEST_DIR/hub $DEST_DIR/gateway $DEST_DIR/packages $DEST_DIR/dist $DEST_DIR/deploy
          "

          # 2. Sync Configuration and Scripts
          gcloud compute scp --recurse deploy $INSTANCE_NAME:$DEST_DIR --zone=$ZONE --project=$PROJECT --quiet
          gcloud compute scp package.json package-lock.json $INSTANCE_NAME:$DEST_DIR --zone=$ZONE --project=$PROJECT --quiet

          # 3. Sync Source Code (Directories)
          gcloud compute scp --recurse web $INSTANCE_NAME:$DEST_DIR --zone=$ZONE --project=$PROJECT --quiet
          gcloud compute scp --recurse hub $INSTANCE_NAME:$DEST_DIR --zone=$ZONE --project=$PROJECT --quiet
          gcloud compute scp --recurse gateway $INSTANCE_NAME:$DEST_DIR --zone=$ZONE --project=$PROJECT --quiet
          gcloud compute scp --recurse packages $INSTANCE_NAME:$DEST_DIR --zone=$ZONE --project=$PROJECT --quiet

          # 4. Trigger Remote Setup and Build
          gcloud compute ssh $INSTANCE_NAME --zone=$ZONE --project=$PROJECT --quiet --command="
            cd $DEST_DIR
            chmod +x deploy/remote_setup_and_build.sh
            bash deploy/remote_setup_and_build.sh
          "
