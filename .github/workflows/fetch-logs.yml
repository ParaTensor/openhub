name: Fetch Logs
on:
  push:
    branches: [ log-fetch ]

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4
      - uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/346794112698/locations/global/workloadIdentityPools/xrouter-github-pool/providers/xrouter-github-provider'
          service_account: 'xrouter-github-sa@xinference.iam.gserviceaccount.com'
      - uses: 'google-github-actions/setup-gcloud@v2'
        with:
          project_id: 'gen-lang-client-0208597279'
      - shell: bash
        run: |
          gcloud compute ssh mac-m4@instance-pararouter --zone=us-central1-f --project=gen-lang-client-0208597279 --quiet --command="sudo journalctl -u openhub-hub -n 100 --no-pager"
          echo "====="
          gcloud compute ssh mac-m4@instance-pararouter --zone=us-central1-f --project=gen-lang-client-0208597279 --quiet --command="sudo journalctl -u openhub-gateway -n 100 --no-pager"
