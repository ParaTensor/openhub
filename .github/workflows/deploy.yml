name: GCP Deployment (Remote Build)
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          # Using the WIF Service Account from the 'xinference' project
          workload_identity_provider: 'projects/346794112698/locations/global/workloadIdentityPools/xrouter-github-pool/providers/xrouter-github-provider'
          service_account: 'xrouter-github-sa@xinference.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'
        with:
          # Target project where the VM lives
          project_id: 'gen-lang-client-0208597279'

      - name: Sync Source and Build Remotely
        shell: bash
        run: |
          INSTANCE_NAME="instance-pararouter"
          ZONE="us-central1-f"
          PROJECT="gen-lang-client-0208597279"
          DEST_DIR="/home/mac-m4/openhub"
          TMP_DIR="~/openhub-tmp"

          echo "1. Preparing remote temporary directory..."
          gcloud compute ssh $INSTANCE_NAME --zone=$ZONE --project=$PROJECT --quiet --command="
            rm -rf $TMP_DIR
            mkdir -p $TMP_DIR
          "

          echo "2. Uploading files to temporary directory..."
          gcloud compute scp --recurse deploy package.json package-lock.json gateway hub web packages $INSTANCE_NAME:$TMP_DIR/ --zone=$ZONE --project=$PROJECT --quiet

          echo "3. Moving files to final destination and building..."
          gcloud compute ssh $INSTANCE_NAME --zone=$ZONE --project=$PROJECT --quiet --command="
            # Create target and wipe old app folders
            sudo mkdir -p $DEST_DIR
            sudo rm -rf $DEST_DIR/gateway $DEST_DIR/hub $DEST_DIR/web $DEST_DIR/packages $DEST_DIR/deploy
            
            # Copy new files from TMP_DIR
            sudo cp -r $TMP_DIR/* $DEST_DIR/
            
            # Fix ownership for the systemd user
            sudo chown -R mac-m4:mac-m4 $DEST_DIR
            
            # Execute setup script
            cd $DEST_DIR
            sudo chmod +x deploy/remote_setup_and_build.sh
            sudo bash deploy/remote_setup_and_build.sh
          "
