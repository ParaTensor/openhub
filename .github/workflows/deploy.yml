name: Domestic Server Deployment
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      SERVER_IP: "1.13.23.141"
      SERVER_USER: "root"
      TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.DOMESTIC_SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SERVER_IP >> ~/.ssh/known_hosts

      - name: Download Cloudflared Binary
        run: |
          curl -L --output ./cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x ./cloudflared

      - name: Sync Source to Server
        run: |
          DEST_DIR="/root/openhub"
          TMP_DIR="/root/openhub-tmp"
          
          echo "1. Preparing remote temporary directory and freeing space..."
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_IP "
            rm -rf $TMP_DIR
            yum clean all || apt-get clean || true
            journalctl --vacuum-time=12h || true
            mkdir -p $TMP_DIR
          "
          
          echo "2. Uploading files to temporary directory..."
          rsync -avz --exclude '.git' --exclude 'node_modules' --exclude 'target' -e "ssh -o ServerAliveInterval=15 -o ServerAliveCountMax=120 -i ~/.ssh/deploy_key" --timeout=300 ./cloudflared ./deploy ./package.json ./package-lock.json ./gateway ./hub ./web ./packages $SERVER_USER@$SERVER_IP:$TMP_DIR/
          
          echo "3. Moving files to final destination and building..."
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=120 -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_IP "
            mkdir -p $DEST_DIR
            
            # Wipe old app source folders but CAREFULLY PRESERVE gateway/target for Rust cache
            rm -rf $DEST_DIR/hub $DEST_DIR/web $DEST_DIR/packages $DEST_DIR/deploy
            rm -rf $DEST_DIR/gateway/src $DEST_DIR/gateway/migrations || true
            
            # Copy new files from TMP_DIR
            cp -r $TMP_DIR/* $DEST_DIR/
            
            # Execute setup script
            cd $DEST_DIR
            chmod +x deploy/remote_setup_and_build.sh
            TUNNEL_TOKEN=\"$TUNNEL_TOKEN\" bash deploy/remote_setup_and_build.sh
          "
